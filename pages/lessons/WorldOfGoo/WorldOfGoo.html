<!DOCTYPE html>
<html lang="en">
<head>
    <title>Downloadable game</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="../../../css/fontawesome.css"/>
    <link rel="stylesheet" href="../../../css/otherpages.css"></link>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button {
            width: 15vw;
            height: 5vh;
        }
    </style>
</head>
<body>
    <h1 id="text1" style="margin-top: 20vh;"> Download World of Goo</h1>
    <h3 id="text2" style="margin-bottom: 10vh;"> This is an exe file so you have to download it instead of play it on the site</h3>
    <button id="downloadButton">Download World of Goo</button>
    <script>
        document.getElementById('downloadButton').addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = 'WorldOfGoo.zip';
            a.download = 'WorldOfGoo.zip';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
    <script src="../../../js/typeanimation.js"></script>
    <script src="../../../js/masking.js"></script>
</body>
</html>
