<!DOCTYPE html>
<html lang="en">
<head>
    <title>Downloadable game</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="../../../css/fontawesome.css"/>
    <link rel="stylesheet" href="../../../css/otherpages.css"></link>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button {
            width: 15vw;
            height: 5vh;
        }
    </style>
</head>
<body>
    <h1 style="margin-top: 20vh;">> Polytrack</h1>
    <h4 id="text1"> Due to CORS restrictions put in place by the owners of Polytrack, the web version hosted on this site is not up to date.</h3>
    <h4 id="text2" style="margin-bottom: 10vh;"> To play the newest version, you can download it here, you can also play the slightly outdated web version</h4>
    <button id="downloadButton">Download Polytrack</button>
    <br>
    <button id="proceed">Proceed to web version</button>

    <script>
        document.getElementById('downloadButton').addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = 'Polytrack.zip';
            a.download = 'Polytrack.zip';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
        document.getElementById('proceed').addEventListener('click', () => {
            proceed();
        });
        function proceed() {
            const win = window.open();
            win.document.open();
            win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0;overflow:hidden;}html,body{width:100%;height:100%;background:black;}</style></head><body></body></html>');
            win.document.close();

            const iframe = win.document.createElement("iframe");
            iframe.style.cssText = `
                border: none;
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                display: block;
            `;
            iframe.allow = "fullscreen; autoplay; gamepad *; camera; microphone; display-capture; web-share; accelerometer; gyroscope; payment; usb; midi; xr-spatial-tracking; clipboard-read; clipboard-write; cross-origin-isolated";
            iframe.setAttribute("allowfullscreen", "");
            iframe.setAttribute("allowtransparency", "true");
            iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-top-navigation allow-modals allow-downloads allow-storage-access-by-user-activation allow-popups-to-escape-sandbox";
            iframe.src = "polytrack-web/polytrack-web.html";
            win.document.body.appendChild(iframe);
        }
    </script>
    <script src="../../../js/typeanimation.js"></script>
    <script src="../../../js/masking.js"></script>
</body>
</html>
