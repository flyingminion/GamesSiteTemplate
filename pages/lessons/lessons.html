    <script src="../../js/masking.js"></script>
    <script>
        const searchInput = document.getElementById('gamesearchinput');
        const grid = document.getElementById('gamesgrid');
        const noResults = document.getElementById('no-results');
        noResults.style.display = 'none';

        searchInput.addEventListener('input', function () {
            const query = this.value.trim().toLowerCase();
            const buttons = grid.querySelectorAll('button');
            let visibleCount = 0;
            buttons.forEach(btn => {
                const name = btn.textContent.trim().toLowerCase();
                const matches = !query || name.includes(query);
                btn.style.display = matches ? '' : 'none';
                if (matches) {
                    visibleCount++
                }
            });

            noResults.style.display = visibleCount == 0 ? 'block' : 'none';
        });

        // function openGame(url) {
        //     url = "pages/lessons/" + url;
        //     window.parent.postMessage({
        //         type: 'gamenav',
        //         url: url
        //     }, '*');
        // }
        function openGame(url) {
            const win = window.open();
            win.document.open();
            win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0;overflow:hidden;}html,body{width:100%;height:100%;background:black;}</style></head><body></body></html>');
            win.document.close();
            const iframe = win.document.createElement("iframe");
            iframe.style.cssText = `
                border: none;
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                display: block;
            `;
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }
    </script>
